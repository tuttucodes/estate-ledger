<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift-low { background-color: rgba(242, 244, 246, 0.8); }
        .tonal-shift-high { background-color: rgba(236, 238, 240, 0.95); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface antialiased mb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-200 text-indigo-900">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-indigo-900">Add Expense</h1>
</div>
<button class="active:scale-95 duration-200 text-indigo-900">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<main class="pt-20 px-6 max-w-2xl mx-auto">
<!-- Receipt Preview Section -->
<section class="mb-8 mt-4">
<div class="relative overflow-hidden rounded-xl bg-surface-container-low p-1 aspect-[4/3] group">
<img alt="Scanned Receipt" class="w-full h-full object-cover rounded-lg shadow-sm" data-alt="Close up of a printed paper receipt with financial text and numbers on a neutral gray office desk surface in soft daylight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJIYcUnN04ahRD1jiJvWlVFhkkLgHHW8yC7cOjzTj89PO_NKHpGadnp0xkyQFyB918K82BGN8Jo4oigcL4398G_8KBkKQc9P1_0ItRYTtRGlAXtUpTzqxefgRBF7j1rQ-x1VEsSB2pXQ6JZDWEnkbC6ZXYyB_5vyKiD1BAVSYICDyXrDlPoHgtGTvSTT6QuFaDjs88q2TZCH0rEHlzk8Cl0h_HcbyoQIkFuIPLBPZZqj2KckBMiMCPNNhTtGnkeEfYeluGSqueRgry"/>
<div class="absolute bottom-4 left-4 right-4 flex justify-between items-center">
<span class="bg-tertiary-container/90 backdrop-blur-md text-on-tertiary-container px-3 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1.5 border border-tertiary-container/20">
<span class="material-symbols-outlined text-sm" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
                        AI Confidence: 98%
                    </span>
<button class="bg-white/90 backdrop-blur-md text-primary p-2 rounded-full shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="zoom_in">zoom_in</span>
</button>
</div>
</div>
</section>
<!-- Editable Form Section -->
<section class="space-y-6">
<!-- Amount Card -->
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-[0px_12px_32px_rgba(25,28,30,0.06)]">
<label class="block text-xs font-semibold text-on-surface-variant mb-1 uppercase tracking-wider">Total Amount</label>
<div class="flex items-baseline gap-2">
<span class="font-headline text-3xl font-bold text-primary">$</span>
<input class="w-full font-headline text-4xl font-extrabold text-on-surface bg-transparent border-none focus:ring-0 p-0" step="0.01" type="number" value="1248.50"/>
</div>
</div>
<!-- Detail Fields -->
<div class="bg-surface-container-low rounded-xl p-6 space-y-6">
<!-- Property Dropdown -->
<div class="space-y-1">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Property</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-highest border-none rounded-lg py-3 px-4 text-on-surface font-semibold focus:bg-surface-container-lowest focus:ring-2 focus:ring-surface-tint/20 transition-all">
<option>The Heights - Unit 402</option>
<option>Skyline Lofts - Penthouse</option>
<option>Oak Ridge Estates - Main Office</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="keyboard_arrow_down">keyboard_arrow_down</span>
</div>
</div>
<!-- Category Dropdown -->
<div class="space-y-1">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Expense Category</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-highest border-none rounded-lg py-3 px-4 text-on-surface font-semibold focus:bg-surface-container-lowest focus:ring-2 focus:ring-surface-tint/20 transition-all">
<option>Maintenance &amp; Repairs</option>
<option>Utilities</option>
<option>Insurance</option>
<option>Marketing</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="construction">construction</span>
</div>
</div>
<!-- Date Picker -->
<div class="space-y-1">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Transaction Date</label>
<div class="relative">
<input class="w-full appearance-none bg-surface-container-highest border-none rounded-lg py-3 px-4 text-on-surface font-semibold focus:bg-surface-container-lowest focus:ring-2 focus:ring-surface-tint/20 transition-all" type="date" value="2023-10-24"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<!-- Notes Textarea -->
<div class="space-y-1">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Notes (Optional)</label>
<textarea class="w-full appearance-none bg-surface-container-highest border-none rounded-lg py-3 px-4 text-on-surface font-medium focus:bg-surface-container-lowest focus:ring-2 focus:ring-surface-tint/20 transition-all resize-none" placeholder="Add specific details about this repair..." rows="3">HVAC maintenance for North wing apartments. Includes filter replacement and thermostat recalibration.</textarea>
</div>
</div>
</section>
<!-- Confirm Action -->
<div class="mt-8 mb-12">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary py-5 rounded-xl font-headline font-bold text-lg shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                Confirm &amp; Save Expense
            </button>
<button class="w-full mt-4 text-primary font-bold py-2 active:scale-95 transition-transform">
                Recapture Receipt
            </button>
</div>
</main>
<!-- BottomNavBar (Filtered for visibility context) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center pt-3 pb-8 px-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-50 rounded-t-3xl shadow-[0px_-12px_32px_rgba(25,28,30,0.06)]">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="domain">domain</span>
<span class="font-inter text-xs font-semibold">Portfolio</span>
</a>
<a class="flex flex-col items-center justify-center bg-indigo-100 dark:bg-indigo-900/40 text-indigo-900 dark:text-indigo-200 rounded-2xl px-5 py-2 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<span class="font-inter text-xs font-semibold">Expenses</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-inter text-xs font-semibold">Receipts</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-inter text-xs font-semibold">Settings</span>
</a>
</nav>
</body></html>
