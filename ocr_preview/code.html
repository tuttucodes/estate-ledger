<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OCR Preview - Estate Ledger</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#e0e3e5",
                        "tertiary": "#004e33",
                        "on-error": "#ffffff",
                        "surface-variant": "#e0e3e5",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#57657a",
                        "primary-container": "#3f51b5",
                        "on-tertiary-fixed": "#002113",
                        "secondary-fixed": "#d5e3fc",
                        "primary-fixed": "#dee0ff",
                        "tertiary-container": "#006846",
                        "surface-container": "#eceef0",
                        "surface-container-high": "#e6e8ea",
                        "inverse-primary": "#bac3ff",
                        "on-background": "#191c1e",
                        "on-surface": "#191c1e",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2d3133",
                        "inverse-on-surface": "#eff1f3",
                        "surface-tint": "#4355b9",
                        "on-primary-fixed": "#00105c",
                        "surface-container-low": "#f2f4f6",
                        "surface-dim": "#d8dadc",
                        "tertiary-fixed-dim": "#4edea3",
                        "secondary-container": "#d5e3fc",
                        "primary-fixed-dim": "#bac3ff",
                        "on-secondary-fixed-variant": "#3a485b",
                        "on-tertiary-container": "#5debaf",
                        "secondary": "#515f74",
                        "surface": "#f7f9fb",
                        "on-tertiary-fixed-variant": "#005236",
                        "primary": "#24389c",
                        "background": "#f7f9fb",
                        "on-secondary-fixed": "#0d1c2e",
                        "tertiary-fixed": "#6ffbbe",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#454652",
                        "on-primary-fixed-variant": "#293ca0",
                        "on-primary-container": "#cacfff",
                        "surface-bright": "#f7f9fb",
                        "secondary-fixed-dim": "#b9c7df",
                        "outline-variant": "#c5c5d4",
                        "outline": "#757684",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        body {
            background-color: #f7f9fb;
            color: #191c1e;
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-slate-900/80 backdrop-blur-xl">
<div class="flex items-center px-4 h-16 w-full max-w-screen-xl mx-auto">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100/50 transition-colors active:scale-95 duration-200 text-indigo-900">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="ml-2 font-['Manrope'] font-bold text-lg tracking-tight text-indigo-900">Add Document</h1>
<div class="ml-auto flex items-center space-x-2">
<span class="bg-tertiary-container text-on-tertiary-container px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">AI Analysis Active</span>
</div>
</div>
</header>
<main class="pt-20 pb-32 px-4 max-w-lg mx-auto">
<!-- Scanned Document Preview Section -->
<section class="mb-8">
<div class="relative group">
<div class="w-full aspect-[3/4] rounded-3xl overflow-hidden bg-surface-container-high shadow-sm transition-transform duration-300 group-hover:scale-[1.01]">
<img alt="Document Preview" class="w-full h-full object-cover grayscale-[0.2] contrast-[1.1]" data-alt="Close-up high angle shot of a printed rental agreement document on a wooden desk with soft natural window lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBHPAmh7L29UkVS8AmN7fAEbUv4ecTmwtQImW5NyJS74M_sJaXnD4HpiDq9573IgUvMBRqnVXsgnq1StQ1dlnmNGKXtBq3Shq4OCPTbYIsiWGQOmsT-tdU3_mKqQ6vSvBaSyIG5JP4EPOMj75VW4-fJHIb6LDLT3kOFV8XBjK5NMDdpQXuPLoyfjtQVHZx7H4nZiXR_0ednvP8LO-z0-S7eFFAn-eB2gXrZ7fgBZFtLV6F6PXsz1aaKdYU4AgtMNVC0r5R3LDZygk_k"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/20 to-transparent pointer-events-none"></div>
<!-- OCR Scanning Overlay Simulation -->
<div class="absolute top-1/4 left-0 w-full h-1 bg-primary/40 blur-sm"></div>
</div>
<div class="absolute -bottom-4 right-6 flex items-center gap-2">
<button class="bg-surface-container-lowest text-primary p-3 rounded-full shadow-lg border-2 border-primary/5 active:scale-90 transition-all">
<span class="material-symbols-outlined">zoom_in</span>
</button>
<button class="bg-surface-container-lowest text-primary p-3 rounded-full shadow-lg border-2 border-primary/5 active:scale-90 transition-all">
<span class="material-symbols-outlined">refresh</span>
</button>
</div>
</div>
</section>
<!-- Extracted Data Fields -->
<section class="space-y-6">
<div class="flex items-end justify-between px-2">
<div>
<h2 class="text-xl font-bold tracking-tight text-primary">Verify Information</h2>
<p class="text-sm text-on-surface-variant font-medium">Extracted details from your scan</p>
</div>
<span class="text-xs font-bold text-tertiary flex items-center gap-1 bg-tertiary/10 px-2 py-1 rounded-md">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    98% Match
                </span>
</div>
<div class="space-y-4">
<!-- Field: Document Title -->
<div class="bg-surface-container-low p-5 rounded-3xl transition-all hover:bg-surface-container-high group border-2 border-transparent focus-within:border-primary/20 focus-within:bg-surface-container-lowest">
<div class="flex items-center justify-between mb-1">
<label class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant/70">Document Title</label>
<span class="material-symbols-outlined text-on-surface-variant/40 group-hover:text-primary transition-colors text-sm">edit</span>
</div>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-headline font-semibold text-lg focus:ring-0" type="text" value="Residential Lease Agreement - Unit 4B"/>
</div>
<!-- Bento Grid Style for Small Fields -->
<div class="grid grid-cols-2 gap-4">
<!-- Field: Date -->
<div class="bg-surface-container-low p-5 rounded-3xl transition-all hover:bg-surface-container-high group border-2 border-transparent focus-within:border-primary/20 focus-within:bg-surface-container-lowest">
<div class="flex items-center justify-between mb-1">
<label class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant/70">Date Issued</label>
<span class="material-symbols-outlined text-on-surface-variant/40 text-sm">calendar_today</span>
</div>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-headline font-semibold text-lg focus:ring-0" type="text" value="Oct 12, 2023"/>
</div>
<!-- Field: Amount -->
<div class="bg-surface-container-low p-5 rounded-3xl transition-all hover:bg-surface-container-high group border-2 border-transparent focus-within:border-primary/20 focus-within:bg-surface-container-lowest">
<div class="flex items-center justify-between mb-1">
<label class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant/70">Total Amount</label>
<span class="material-symbols-outlined text-on-surface-variant/40 text-sm">payments</span>
</div>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-headline font-semibold text-lg focus:ring-0" type="text" value="$2,450.00"/>
</div>
</div>
<!-- Field: Tenant Name -->
<div class="bg-surface-container-low p-5 rounded-3xl transition-all hover:bg-surface-container-high group border-2 border-transparent focus-within:border-primary/20 focus-within:bg-surface-container-lowest">
<div class="flex items-center justify-between mb-1">
<label class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant/70">Tenant Name</label>
<span class="material-symbols-outlined text-on-surface-variant/40 text-sm">person</span>
</div>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-headline font-semibold text-lg focus:ring-0" type="text" value="Sarah J. Montgomery"/>
</div>
<!-- Field: Property Reference -->
<div class="bg-surface-container-low p-5 rounded-3xl transition-all hover:bg-surface-container-high group border-2 border-transparent focus-within:border-primary/20 focus-within:bg-surface-container-lowest">
<div class="flex items-center justify-between mb-1">
<label class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant/70">Property Address</label>
<span class="material-symbols-outlined text-on-surface-variant/40 text-sm">location_on</span>
</div>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-headline font-semibold text-lg focus:ring-0" type="text" value="882 Skyline Drive, Los Angeles, CA"/>
</div>
</div>
<!-- Notes or AI Insight Card -->
<div class="bg-primary/5 p-6 rounded-3xl border border-primary/10">
<div class="flex items-start gap-4">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div>
<h4 class="font-headline font-bold text-primary mb-1">AI Suggestion</h4>
<p class="text-sm text-on-surface-variant leading-relaxed">This looks like a renewal document. Would you like to update the existing ledger entry for Unit 4B?</p>
<div class="mt-3 flex gap-3">
<button class="text-xs font-bold text-primary hover:underline">Yes, link entry</button>
<button class="text-xs font-bold text-on-surface-variant/60 hover:underline">Dismiss</button>
</div>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full p-6 pb-8 glass-effect bg-surface/80 z-50">
<div class="max-w-lg mx-auto flex gap-4">
<button class="flex-1 bg-surface-container-high text-on-surface font-bold py-4 rounded-3xl active:scale-95 transition-all text-sm">
                Cancel
            </button>
<button class="flex-[2] bg-gradient-to-br from-primary to-primary-container text-white font-bold py-4 rounded-3xl shadow-xl shadow-primary/20 active:scale-95 transition-all text-sm flex items-center justify-center gap-2">
<span>Confirm and Save</span>
<span class="material-symbols-outlined text-base">check_circle</span>
</button>
</div>
</footer>
<!-- Bottom Nav Suppression Logic: User is in a focused journey (OCR Review), so the global BottomNavBar is excluded per the "Task-Focused" rule. -->
</body></html>
